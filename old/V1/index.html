<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulateurs de probabilités</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #1a1714;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      text-align: center;
      margin-bottom: 0.4rem;
      position: relative;
    }

    .title em { font-style: italic; color: #f0a070; }

    .sub {
      font-size: 15px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-bottom: 2.5rem;
      font-weight: 300;
      position: relative;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    a.btn {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      padding: 1.1rem 1.4rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }

    a.btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
      transform: translateX(5px);
    }

    .btn-icon {
      font-size: 2rem;
      width: 44px;
      text-align: center;
      flex-shrink: 0;
    }

    .btn-title {
      font-size: 18px;
      font-weight: 500;
    }

    .btn-arrow {
      font-size: 16px;
      color: rgba(255,255,255,0.25);
      transition: color 0.18s;
      margin-left: auto;
    }

    a.btn:hover .btn-arrow { color: rgba(255,255,255,0.7); }

    .title  { animation: up 0.5s ease both; }
    .sub    { animation: up 0.5s 0.07s ease both; }
    a.btn:nth-child(1) { animation: up 0.45s 0.12s ease both; }
    a.btn:nth-child(2) { animation: up 0.45s 0.19s ease both; }
    a.btn:nth-child(3) { animation: up 0.45s 0.26s ease both; }
    a.btn:nth-child(4) { animation: up 0.45s 0.33s ease both; }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      position: relative;
      animation: up 0.45s 0.42s ease both;
    }

    footer a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      transition: color 0.15s;
    }

    footer a:hover { color: #f0a070; border-bottom-color: #f0a070; }
  </style>
</head>
<body>

  <h1 class="title">Simulateurs de <em>probabilités</em></h1>
  <p class="sub">Choisissez une expérience aléatoire</p>

  <div class="buttons">
    <a class="btn" href="simulateur_piece.html">
      <span class="btn-icon">🪙</span>
      <span class="btn-title">Lancer de pièce</span>
      <span class="btn-arrow">→</span>
    </a>

    <a class="btn" href="simulateur_lancer_des.html">
      <span class="btn-icon">🎲</span>
      <span class="btn-title">Lancer d'un dé</span>
      <span class="btn-arrow">→</span>
    </a>

    <a class="btn" href="simulateur_deux_des.html">
      <span class="btn-icon">🎲🎲</span>
      <span class="btn-title">Somme de deux dés</span>
      <span class="btn-arrow">→</span>
    </a>

    <a class="btn" href="simulateur_roue.html">
      <span class="btn-icon">🎡</span>
      <span class="btn-title">Roue aléatoire</span>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <footer>
    Bug ou suggestion ? <a href="mailto:pro.louislagon@gmail.com">pro.louislagon@gmail.com</a>
  </footer>

</body>
</html>
