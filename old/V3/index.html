<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulateurs de probabilités</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f7f4ef;
      --bg2:     rgba(0,0,0,0.05);
      --bg3:     rgba(0,0,0,0.09);
      --text:    #1a1714;
      --text2:   rgba(0,0,0,0.55);
      --text3:   rgba(0,0,0,0.35);
      --border:  rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.2);
      --dot:     rgba(0,0,0,0.08);
      --accent:  #c8410a;
      --footer:  rgba(0,0,0,0.3);
      --footer-link: rgba(0,0,0,0.5);
    }

    body.dark {
      --bg:      #1a1714;
      --bg2:     rgba(255,255,255,0.06);
      --bg3:     rgba(255,255,255,0.11);
      --text:    #ffffff;
      --text2:   rgba(255,255,255,0.55);
      --text3:   rgba(255,255,255,0.35);
      --border:  rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --dot:     rgba(255,255,255,0.07);
      --footer:  rgba(255,255,255,0.25);
      --footer-link: rgba(255,255,255,0.45);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      transition: background 0.25s, color 0.25s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(var(--dot) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      text-align: center;
      margin-bottom: 0.4rem;
      position: relative;
    }

    .title em { font-style: italic; color: var(--accent); }

    .sub {
      font-size: 15px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 2.5rem;
      font-weight: 300;
      position: relative;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    a.btn {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      padding: 1.1rem 1.4rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
    }

    a.btn:hover {
      background: var(--bg3);
      border-color: var(--border2);
      transform: translateX(5px);
    }

    .btn-icon { font-size: 2rem; width: 44px; text-align: center; flex-shrink: 0; }
    .btn-title { font-size: 18px; font-weight: 500; }
    .btn-arrow { font-size: 16px; color: var(--text3); transition: color 0.18s; margin-left: auto; }
    a.btn:hover .btn-arrow { color: var(--text2); }

    .title  { animation: up 0.5s ease both; }
    .sub    { animation: up 0.5s 0.07s ease both; }
    a.btn:nth-child(1) { animation: up 0.45s 0.12s ease both; }
    a.btn:nth-child(2) { animation: up 0.45s 0.19s ease both; }
    a.btn:nth-child(3) { animation: up 0.45s 0.26s ease both; }
    a.btn:nth-child(4) { animation: up 0.45s 0.33s ease both; }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: var(--footer);
      text-align: center;
      position: relative;
      animation: up 0.45s 0.42s ease both;
    }

    footer a {
      color: var(--footer-link);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.15s;
    }

    footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

    .theme-toggle {
      position: fixed;
      top: 14px; right: 16px;
      z-index: 100;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.15s;
      font-family: inherit;
    }
    .theme-toggle:hover { background: var(--bg3); transform: scale(1.08); }

    /* ── GEEK THEME ── */
    body.geek {
      --bg:      #1a1b2e;
      --bg2:     #24253a;
      --bg3:     #2d2e4a;
      --text:    #c0caf5;
      --text2:   #9aa5ce;
      --text3:   #565f89;
      --border:  rgba(122,162,247,0.18);
      --border2: rgba(187,154,247,0.32);
      --info-bg: rgba(122,162,247,0.12);
      --info-text: #7aa2f7;
      --accent:  #bb9af7;
      --dot:     rgba(122,162,247,0.07);
      --footer:  rgba(192,202,245,0.3);
      --footer-link: rgba(122,162,247,0.7);
    }
    body.geek .card {
      border-color: rgba(122,162,247,0.2);
      box-shadow: 0 0 0 1px rgba(187,154,247,0.07), 0 8px 32px rgba(13,14,23,0.6);
    }
    body.geek .metric-value {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      letter-spacing: -0.02em;
    }
    body.geek .progress-bar { background: linear-gradient(90deg, #7aa2f7, #bb9af7); }
    body.geek button:not(.reset):not(.theme-toggle) {
      border-color: rgba(122,162,247,0.28);
    }
    body.geek button:not(.reset):not(.theme-toggle):hover {
      border-color: rgba(187,154,247,0.5);
      box-shadow: 0 0 10px rgba(187,154,247,0.18);
    }
    body.geek button.reset { background: #7c3a3a; border-color: #a84040; }
    body.geek button.reset:hover { background: #a84040; }
    body.geek .tag { background: rgba(122,162,247,0.14); color: #7aa2f7; }
    body.geek .btn-home { border-color: rgba(122,162,247,0.28); }
    body.geek .btn-home:hover { box-shadow: 0 0 8px rgba(187,154,247,0.15); }
    /* Index specific */
    body.geek a.btn { border-color: rgba(122,162,247,0.22); }
    body.geek a.btn:hover {
      border-color: rgba(187,154,247,0.45);
      box-shadow: 0 0 14px rgba(187,154,247,0.12);
    }
    body.geek .title em { color: #bb9af7; }
    body.geek footer a:hover { color: #bb9af7; border-bottom-color: #bb9af7; }

    .btn-qr {
      padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
      border-radius: 8px; font-family: inherit;
      background: var(--bg2); border: 1px solid var(--border2); color: var(--text2);
      transition: background 0.15s;
    }
    .btn-qr:hover { background: var(--bg3); color: var(--text); }
    #qr-url:focus { border-color: var(--border2); box-shadow: 0 0 0 2px rgba(122,162,247,0.15); }
    #qr-code canvas, #qr-code img { border-radius: 8px; padding: 10px; background: #fff; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      const icons = { light: '🌙', dark: '💻', geek: '>_' };
      // Apply class once body is available
      document.addEventListener('DOMContentLoaded', () => {
        if (theme !== 'light') document.body.classList.add(theme);
        const btn = document.querySelector('.theme-toggle');
        if (btn) btn.textContent = icons[theme] || '🌙';
      });
    })();
    function toggleTheme() {
      const b = document.body;
      const icons = { light: '🌙', dark: '💻', geek: '>_' };
      let next;
      if (b.classList.contains('dark'))      { b.classList.replace('dark','geek'); next='geek'; }
      else if (b.classList.contains('geek')) { b.classList.remove('geek');          next='light'; }
      else                                   { b.classList.add('dark');             next='dark'; }
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent = icons[next];
    }
  </script>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Changer le thème">🌙</button>

  <h1 class="title">Simulateurs de <em>probabilités</em></h1>
  <p class="sub">Choisissez une expérience aléatoire</p>

  <div class="buttons">
    <a class="btn" href="simulateur_piece.html">
      <span class="btn-icon">🪙</span>
      <span class="btn-title">Lancer de pièce</span>
      <span class="btn-arrow">→</span>
    </a>
    <a class="btn" href="simulateur_lancer_des.html">
      <span class="btn-icon">🎲</span>
      <span class="btn-title">Lancer d'un dé</span>
      <span class="btn-arrow">→</span>
    </a>
    <a class="btn" href="simulateur_deux_des.html">
      <span class="btn-icon">🎲🎲</span>
      <span class="btn-title">Somme de deux dés</span>
      <span class="btn-arrow">→</span>
    </a>
    <a class="btn" href="simulateur_roue.html">
      <span class="btn-icon">🎡</span>
      <span class="btn-title">Roue aléatoire</span>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <footer>
    Bug ou suggestion ? <a href="mailto:pro.louislagon@gmail.com">pro.louislagon@gmail.com</a>
  </footer>

  <div style="margin-top:2rem;display:flex;flex-direction:column;align-items:center;position:relative;">
    <button class="btn-qr" id="btn-qr" onclick="toggleQR()">⬛ QR code</button>
    <div id="qr-panel" hidden style="margin-top:1rem;text-align:center;">
      <div id="qr-code" style="display:flex;justify-content:center;"></div>
      <div style="font-size:11px;color:var(--text3);margin-top:8px;">mathsciencesversailles.github.io/Simulateur</div>
    </div>
  </div>

</body>
<script>
  const QR_URL = 'https://mathsciencesversailles.github.io/Simulateur/';
  let qrGenerated = false;
  function toggleQR() {
    const panel = document.getElementById('qr-panel');
    panel.hidden = !panel.hidden;
    document.getElementById('btn-qr').textContent = panel.hidden ? '⬛ QR code' : '✕ Fermer';
    if (!panel.hidden && !qrGenerated) {
      new QRCode(document.getElementById('qr-code'), {
        text: QR_URL, width: 180, height: 180,
        colorDark: '#1a1714', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrGenerated = true;
    }
  }
</script>
</html>
